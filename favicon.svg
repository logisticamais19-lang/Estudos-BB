<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Fundo amarelo arredondado -->
  <rect width="32" height="32" rx="6" fill="#F9DD16"/>
  <!-- Aba horizontal do chapéu -->
  <rect x="5" y="17" width="22" height="3" rx="1.5" fill="#001A55"/>
  <!-- Topo do chapéu (losango achatado) -->
  <polygon points="16,8 28,14 16,18 4,14" fill="#001A55"/>
  <!-- Topo mais escuro (volume) -->
  <polygon points="16,8 28,14 16,11" fill="#001433"/>
  <!-- Cordão lateral -->
  <line x1="26" y1="14" x2="26" y2="21" stroke="#001A55" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="26" cy="22" r="1.5" fill="#001A55"/>
</svg>
